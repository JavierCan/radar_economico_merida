project:
  name: radar_economico_merida
  city: Merida
  state: Yucatan
  country: Mexico
  stage: phase_2

paths:
  raw: data/raw
  processed: data/processed
  snapshots: data/snapshots
  metadata: data/metadata
  external: data/external
  logs: logs

files:
  latest_dataset: data/processed/radar_merida_latest.parquet
  manifest: data/metadata/manifest.csv
  latest_hash: data/metadata/latest_hash.txt
  merida_geojson: data/external/merida_limites.geojson

sources:
  primary: denue_api
  secondary: merida_geo_layer

denue:
  enabled: true
  api_token_env: INEGI_API_TOKEN
  base_url_env: DENUE_BASE_URL
  timeout_seconds: 60
  queries:
    - restaurante
    - farmacia
    - ferreteria
    - hotel
    - taller
    - supermercado
    - papeleria
    - veterinaria
    - abarrotes
    - panaderia
  location:
    latitud: 20.96737
    longitud: -89.59258
    radio: 5000

merida:
  enabled: true
  local_geojson_path: data/external/merida_limites.geojson
  remote_geojson_url: ""

etl:
  mode: manual_on_demand
  compare_hash: true
  save_snapshots: true
  enabled: true
